name: Update Build Timestamp

on:
  push:
    branches:
      - main
    paths-ignore:
      - '.github/**'

jobs:
  stamp:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Inject build timestamp into config.js
        run: |
          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          sed -i "s/BUILD_TIMESTAMP: \"[^\"]*\"/BUILD_TIMESTAMP: \"$TIMESTAMP\"/" js/config.js
          echo "Stamped: $TIMESTAMP"

      - name: Commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add js/config.js
          git diff --cached --quiet && echo "No change" || git commit -m "chore: update build timestamp"
          git push
