<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>パンセノート — 音声検索アプリ</title>
    <meta
      name="description"
      content="紙ノートに書いた情報の索引を、音声と手入力で登録・検索します。"
    />
    <link rel="stylesheet" href="css/app.css" />
  </head>
  <body>
    <div class="app-wrap">
      <input
        type="file"
        id="import-file"
        class="sr-only"
        accept="application/json,.json"
        aria-hidden="true"
      />

      <header class="app-header">
        <!-- ロゴ（左）・音声ボタン（中）・データ操作ボタン＋件数（右）を1行に -->
        <div class="app-header-row">
          <div class="app-logo-block">
            <img src="img/logo.svg" alt="パンセノート" class="app-logo" />
            <p class="subtitle">（音声検索アプリ）</p>
          </div>

          <div class="voice-row">
            <button
              type="button"
              id="btn-voice-search"
              class="voice-lg voice-btn voice-btn-search"
            >
              <span class="voice-btn-inner">
                <span class="voice-btn-title-row">
                  <span class="voice-btn-mic" aria-hidden="true">
                    <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="currentColor" focusable="false">
                      <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm5-3c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/>
                    </svg>
                  </span>
                  <span class="voice-btn-title">音声検索</span>
                </span>
                <span class="voice-btn-sub">（サービス名の一部）</span>
              </span>
            </button>
            <button
              type="button"
              id="btn-voice-register"
              class="voice-lg voice-btn voice-btn-register"
            >
              <span class="voice-btn-inner">
                <span class="voice-btn-title-row">
                  <span class="voice-btn-mic" aria-hidden="true">
                    <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="currentColor" focusable="false">
                      <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm5-3c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/>
                    </svg>
                  </span>
                  <span class="voice-btn-title">音声登録</span>
                </span>
                <span class="voice-btn-sub">（●冊目●頁・名前）</span>
                <span class="voice-btn-sub">または（"メモ"・サービス名）</span>
              </span>
            </button>
          </div>

          <div class="header-right-block">
            <div class="header-data-actions">
              <button type="button" id="btn-export" class="sm-header btn-action-green">
                データファイル保存
              </button>
              <button type="button" id="btn-import-trigger" class="sm-header btn-header-import">
                読み出し
              </button>
              <button type="button" id="btn-settings-toggle" class="sm-header">
                ▶ 設定・ライセンス
              </button>
            </div>
            <p class="plan-summary" id="plan-summary-line" aria-live="polite"></p>
          </div>
        </div>
      </header>

      <div
        id="license-warning-banner"
        class="license-warning-banner"
        role="status"
        hidden
      ></div>

      <!-- メイン表示エリア（設定展開時は非表示） -->
      <div id="main-section">
        <div id="entry-limit-warning-inline" class="inline-warning" role="status" hidden></div>

        <div class="search-row">
          <label class="sr-only" for="manual-search">手動検索</label>
          <input
            type="search"
            id="manual-search"
            placeholder="サービス名の一部で検索"
            autocomplete="off"
          />
          <button type="button" id="btn-search" class="btn-action-green">
            手動検索
          </button>
        </div>
        <div id="search-meta" class="search-meta" aria-live="polite"></div>

        <div class="table-wrap">
          <table class="entries-table">
            <colgroup>
              <col class="col-title" />
              <col class="col-book" />
              <col class="col-page" />
              <col class="col-date" />
              <col class="col-actions" />
            </colgroup>
            <thead>
              <tr>
                <th scope="col" class="th-title">サービス名</th>
                <th scope="col" class="th-num">冊数</th>
                <th scope="col" class="th-num">ページ</th>
                <th scope="col" class="th-date">登録日付</th>
                <th scope="col" class="th-actions">操作</th>
              </tr>
            </thead>
            <tbody id="entries-body"></tbody>
          </table>
        </div>
      </div>

      <!-- 設定・ライセンスパネル（設定ボタン押下時のみ表示） -->
      <div id="settings-panel" class="settings-panel" hidden>
        <div class="settings-panel-title">▼ 設定・ライセンス</div>
        <div class="settings-body">
          <p class="settings-lead">
            プラン・登録上限は<strong>サーバー返却値</strong>を保存します。キー形式はクライアントで検査するのみで、有効性はサーバー照合です。
          </p>
          <div class="license-form">
            <label for="license-key-input">ライセンスキー</label>
            <div class="license-form-row">
              <input
                type="text"
                id="license-key-input"
                class="license-key-input"
                placeholder="PN1-XXXX-XXXX-XXXX"
                autocomplete="off"
                spellcheck="false"
              />
              <button type="button" id="btn-license-activate" class="primary">
                認証する
              </button>
            </div>
          </div>
          <p id="license-api-url-hint" class="settings-hint"></p>
          <p id="license-api-diagnostics" class="settings-hint" aria-live="polite"></p>
          <ul class="license-meta">
            <li>
              プラン: <span id="license-plan-detail">—</span>
            </li>
            <li>認証状態: <span id="license-status-label">—</span></li>
            <li>初回認証日時: <span id="license-activated-at">—</span></li>
            <li>最終サーバー確認: <span id="license-last-checked">—</span></li>
            <li>次回確認予定: <span id="license-next-check">—</span></li>
            <li>最終バックアップ日: <span id="last-backup-label">—</span></li>
            <li>アプリ版: <span id="app-version-label">—</span> <span id="app-build-label" style="font-size:0.85em;color:var(--muted)"></span></li>
          </ul>
        </div>
      </div>
    </div>

    <div id="toast" role="status" aria-live="polite"></div>

    <script src="js/config.js"></script>
    <script src="js/license.js"></script>
    <script src="js/normalize.js"></script>
    <script src="js/db.js"></script>
    <script src="js/voice.js"></script>
    <script src="js/app.js"></script>
  </body>
</html>
