<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>パンセノート — 紙ノート音声検索アプリ</title>
    <meta
      name="description"
      content="紙ノートに書いた情報の索引を、音声と手入力で登録・検索します。"
    />
    <link rel="stylesheet" href="css/app.css" />
  </head>
  <body>
    <div class="app-wrap">
      <div class="backup-row">
        <button type="button" id="btn-export" class="primary">
          バックアップファイル保存
        </button>
        <button type="button" id="btn-import-trigger">
          バックアップファイル読み出し
        </button>
        <input
          type="file"
          id="import-file"
          class="sr-only"
          accept="application/json,.json"
          aria-hidden="true"
        />
      </div>

      <h1>パンセノート</h1>
      <p class="subtitle">紙ノート音声検索アプリ</p>

      <div
        id="license-warning-banner"
        class="license-warning-banner"
        role="status"
        hidden
      ></div>

      <div class="plan-bar">
        <span class="plan-name" id="plan-name-display">試用版</span>
        <span class="count-line">
          登録 <strong id="entry-count">0</strong> 件 /
          上限 <strong id="entry-limit">30</strong> 件
        </span>
      </div>

      <div class="voice-row">
        <button type="button" id="btn-voice-search" class="primary voice-lg">
          音声検索
        </button>
        <button type="button" id="btn-voice-register" class="primary voice-lg">
          音声登録
        </button>
      </div>

      <div class="search-row">
        <label class="sr-only" for="manual-search">手動検索</label>
        <input
          type="search"
          id="manual-search"
          placeholder="見出しの一部で検索"
          autocomplete="off"
        />
        <button type="button" id="btn-search" class="primary">検索</button>
      </div>
      <div id="search-meta" class="search-meta" aria-live="polite"></div>

      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th scope="col">見出し</th>
              <th scope="col">冊数</th>
              <th scope="col">ページ</th>
              <th scope="col">登録日付</th>
              <th scope="col">操作</th>
            </tr>
          </thead>
          <tbody id="entries-body"></tbody>
        </table>
      </div>

      <details class="settings">
        <summary>設定・ライセンス</summary>
        <div class="settings-body">
          <p class="settings-lead">
            プラン・登録上限は<strong>サーバー返却値</strong>を保存します。キー形式はクライアントで検査するのみで、有効性はサーバー照合です。
          </p>
          <div class="license-form">
            <label for="license-key-input">ライセンスキー</label>
            <div class="license-form-row">
              <input
                type="text"
                id="license-key-input"
                class="license-key-input"
                placeholder="PN1-XXXX-XXXX-XXXX"
                autocomplete="off"
                spellcheck="false"
              />
              <button type="button" id="btn-license-activate" class="primary">
                認証する
              </button>
            </div>
          </div>
          <p id="license-api-url-hint" class="settings-hint"></p>
          <ul class="license-meta">
            <li>
              プラン: <span id="license-plan-detail">—</span>
            </li>
            <li>認証状態: <span id="license-status-label">—</span></li>
            <li>初回認証日時: <span id="license-activated-at">—</span></li>
            <li>最終サーバー確認: <span id="license-last-checked">—</span></li>
            <li>次回確認予定: <span id="license-next-check">—</span></li>
            <li>最終バックアップ日: <span id="last-backup-label">—</span></li>
          </ul>
        </div>
      </details>
    </div>

    <div id="toast" role="status" aria-live="polite"></div>

    <script src="js/config.js"></script>
    <script src="js/license.js"></script>
    <script src="js/normalize.js"></script>
    <script src="js/db.js"></script>
    <script src="js/voice.js"></script>
    <script src="js/app.js"></script>
  </body>
</html>
